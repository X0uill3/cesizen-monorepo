name: CD — Déploiement Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # ÉTAPE 1 : Tests (bloquants avant tout déploiement)
  # ─────────────────────────────────────────────
  test:
    name: Vérification qualité avant déploiement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Installation des dépendances backend
        working-directory: backend
        run: npm ci

      - name: Vérification TypeScript
        working-directory: backend
        run: npx tsc --project tsconfig.build.json --noEmit

      - name: Tests unitaires et intégration
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/cesizen_test
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST || 'test_secret_ci_32_chars_minimum_ok' }}

  # ─────────────────────────────────────────────
  # ÉTAPE 2 : Déploiement Backend → Azure App Service
  # Note : azure/login@v2 requiert un Service Principal Azure AD
  # (AZURE_CLIENT_ID / TENANT_ID / SUBSCRIPTION_ID) qui ne peut pas
  # être créé sur la subscription Azure for Students de CESI.
  # Le déploiement manuel se fait via : az webapp up --name cesizen-api
  # ─────────────────────────────────────────────
  deploy-backend:
    name: Déploiement Backend (Azure App Service)
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Installation des dépendances (toutes, pour compilation)
        working-directory: backend
        run: npm ci

      - name: Compilation TypeScript
        working-directory: backend
        run: npx tsc --project tsconfig.build.json

      - name: Suppression des devDependencies avant packaging
        working-directory: backend
        run: npm prune --omit=dev

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Déploiement vers Azure (az webapp up)
        # Historique : azure/webapps-deploy@v2/v3 échouait ("Publish profile
        # invalid", bug connu sur Linux) et le Kudu ZIP deploy via curl
        # renvoyait HTTP 401 (Basic Auth désactivée par la politique de la
        # subscription Azure for Students de CESI). az webapp up (auth ARM
        # via azure/login) est la méthode qui fonctionne réellement.
        working-directory: backend
        run: |
          az webapp up \
            --name cesizen-api \
            --resource-group rg-cesizen \
            --runtime "NODE:22-lts" \
            --sku F1

  # ─────────────────────────────────────────────
  # ÉTAPE 3 : Frontend → Vercel (intégration native GitHub)
  # Vercel déploie automatiquement sur push vers main via
  # son intégration GitHub — pas besoin d'une étape CI ici.
  # ─────────────────────────────────────────────

  # ─────────────────────────────────────────────
  # ÉTAPE 4 : Scan de sécurité dynamique (DAST) post-déploiement
  # ─────────────────────────────────────────────
  zap-scan:
    name: Scan DAST (OWASP ZAP Full Scan)
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      contents: read
      issues: write

    strategy:
      fail-fast: false
      matrix:
        target:
          - name: backend
            url: https://cesizen-api.azurewebsites.net
          - name: frontend
            url: https://cesizen-monorepo.vercel.app

    steps:
      - name: ZAP Full Scan (${{ matrix.target.name }})
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          target: ${{ matrix.target.url }}
          issue_title: "ZAP Full Scan — ${{ matrix.target.name }}"
          artifact_name: "zap-report-${{ matrix.target.name }}"
          fail_action: false
