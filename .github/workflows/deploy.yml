name: CD — Déploiement Production

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # ÉTAPE 1 : Tests (le déploiement ne se lance
  #           que si tous les tests passent)
  # ─────────────────────────────────────────────
  test:
    name: Vérification qualité avant déploiement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Installation des dépendances backend
        working-directory: backend
        run: npm ci

      - name: Vérification TypeScript
        working-directory: backend
        run: npx tsc --project tsconfig.build.json --noEmit

      - name: Tests unitaires et intégration
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/cesizen_test
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST }}

  # ─────────────────────────────────────────────
  # ÉTAPE 2 : Déploiement Backend → Azure App Service
  # ─────────────────────────────────────────────
  deploy-backend:
    name: Déploiement Backend (Azure App Service)
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Installation des dépendances (prod uniquement)
        working-directory: backend
        run: npm ci --omit=dev

      - name: Compilation TypeScript
        working-directory: backend
        run: npx tsc

      - name: Déploiement vers Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend

  # ─────────────────────────────────────────────
  # ÉTAPE 3 : Déploiement Frontend → Azure Static Web Apps
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: Déploiement Frontend (Azure Static Web Apps)
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Installation des dépendances frontend
        working-directory: frontend
        run: npm ci

      - name: Build de production
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Déploiement vers Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist
