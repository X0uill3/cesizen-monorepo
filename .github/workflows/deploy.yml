name: CD — Déploiement Production

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # ÉTAPE 1 : Tests (bloquants avant tout déploiement)
  # ─────────────────────────────────────────────
  test:
    name: Vérification qualité avant déploiement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Installation des dépendances backend
        working-directory: backend
        run: npm ci

      - name: Vérification TypeScript
        working-directory: backend
        run: npx tsc --project tsconfig.build.json --noEmit

      - name: Tests unitaires et intégration
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/cesizen_test
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST }}

  # ─────────────────────────────────────────────
  # ÉTAPE 2 : Déploiement Backend → Azure App Service
  # ─────────────────────────────────────────────
  deploy-backend:
    name: Déploiement Backend (Azure App Service)
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Installation des dépendances (toutes, pour compilation)
        working-directory: backend
        run: npm ci

      - name: Compilation TypeScript
        working-directory: backend
        run: npx tsc --project tsconfig.build.json

      - name: Suppression des devDependencies avant packaging
        working-directory: backend
        run: npm prune --omit=dev

      - name: Déploiement vers Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: cesizen-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend

  # ─────────────────────────────────────────────
  # ÉTAPE 3 : Déploiement Frontend → Vercel
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: Déploiement Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Installation des dépendances frontend
        working-directory: frontend
        run: npm ci

      - name: Build de production
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Déploiement vers Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: "--prod"
