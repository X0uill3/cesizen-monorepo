name: CI — Tests Backend

on:
  push:
    branches: [main, develop, "feature/**", "fix/**", "hotfix/**"]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Tests unitaires & intégration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Installation des dépendances
        working-directory: backend
        run: npm ci

      - name: Vérification TypeScript
        working-directory: backend
        run: npx tsc --project tsconfig.build.json --noEmit

      - name: Tests unitaires
        working-directory: backend
        run: npm run test:unit
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/cesizen_test
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST || 'test_secret_ci_32_chars_minimum_ok' }}

      - name: Tests d'intégration
        working-directory: backend
        run: npm run test:integration
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/cesizen_test
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST || 'test_secret_ci_32_chars_minimum_ok' }}

      - name: Rapport de couverture
        working-directory: backend
        run: npm run test:coverage
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/cesizen_test
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST || 'test_secret_ci_32_chars_minimum_ok' }}

  frontend-check:
    name: Vérification frontend (lint + build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Installation des dépendances
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build de production
        working-directory: frontend
        run: npm run build

  audit-backend:
    name: Audit des dépendances (backend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Installation des dépendances
        working-directory: backend
        run: npm ci

      - name: npm audit (bloquant sur HIGH/CRITICAL, dépendances de production uniquement)
        working-directory: backend
        run: npm audit --omit=dev --audit-level=high

  audit-frontend:
    name: Audit des dépendances (frontend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Installation des dépendances
        working-directory: frontend
        run: npm ci

      - name: npm audit (bloquant sur HIGH/CRITICAL, dépendances de production uniquement)
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high

  codeql:
    name: Analyse statique du code (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Initialisation CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Analyse CodeQL
        uses: github/codeql-action/analyze@v3

  snyk:
    name: Analyse des dépendances (Snyk)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Installation de Snyk CLI
        run: npm install -g snyk

      - name: Snyk test (backend)
        working-directory: backend
        run: |
          npm ci
          snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk test (frontend)
        working-directory: frontend
        run: |
          npm ci
          snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  sonarcloud:
    name: Analyse qualité & sécurité (SonarCloud)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  trivy-fs:
    name: Scan des dépendances (Trivy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Trivy — scan filesystem backend
        uses: aquasecurity/trivy-action@v0.32.0
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: backend
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Trivy — scan filesystem frontend
        uses: aquasecurity/trivy-action@v0.32.0
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: frontend
          severity: HIGH,CRITICAL
          exit-code: "1"
